defaults:
  - trainer: segmentation_iter10000
  - data: C2-cubes1937
  - _self_

# data
input_size: [128, 128, 128]
image_channels: 1
num_classes: 1

# training
seed: 404
lr: 0.0001
batch_size: 4
path_to_chkpt: null
resume_ckpt_path: null
devices: [0,1,2,3]

# logging
log_dir: outputs
project_name: C2-cubes1937-iter10000

# dataloader
dataloader:
  _target_: "torch.utils.data.DataLoader"
  _partial_: True
  num_workers: 4
  prefetch_factor: 2
  batch_size: ${batch_size}
  pin_memory: True
  persistent_workers: False
  drop_last: True
  shuffle: False

# lightning trainer
trainer:
  lightning_module:
    batch_size: ${batch_size}
    input_size: ${input_size}

# evaluator
monitor_metric: valmetric_dice
evaluator:
  _target_: utils.evaluation.Evaluator